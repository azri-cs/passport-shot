# My Passport Photo — nginx config
# Self-hosted static-file server (ADR 0008).
# Build the app with `npm run build`, then deploy `dist/` to serve from here.
#
# Usage: nginx -c /path/to/nginx.conf

events {
  worker_connections 128;
}

http {
  # MIME types
  include       mime.types;
  default_type  application/octet-stream;

  server {
    listen      443 ssl http2;
    server_name passport-shot.example.com;  # ↻ REPLACE

    # TLS — supply your cert/key paths
    ssl_certificate     /etc/ssl/certs/passport-shot.pem;
    ssl_certificate_key /etc/ssl/private/passport-shot.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Root directory after build ──
    root /var/www/passport-shot/dist;
    index index.html;

    # ── Security headers (ADR 0008) ──

    # CSP — allows our origin + MediaPipe wasm/JS + model file;
    # blocks everything else by default (ADR 0005).
    add_header Content-Security-Policy "
      default-src 'none';
      script-src  'self' https://cdn.jsdelivr.net;
      connect-src 'self' https://cdn.jsdelivr.net https://storage.googleapis.com;
      img-src     'self' blob:;
      worker-src  'self' blob:;
      style-src   'self';
      frame-ancestors 'none';
    ";

    # HSTS — do not use preload while the domain is still portable
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Prevent MIME sniffing
    add_header X-Content-Type-Options nosniff;

    # Strongest referrer policy — no URL leakage to the CDN/data hosts
    add_header Referrer-Policy no-referrer;

    # Clickjacking defence
    add_header X-Frame-Options DENY;

    # Feature blast-radius restriction
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), accelerometer=(), gyroscope=(), magnetometer=()";

    # ── Static file serving ──

    # Serve index.html for / (SPA-like, even though there are no client-side routes)
    location / {
      try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location /assets {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # Deny access to dotfiles
    location ~ /\. {
      deny all;
      return 404;
    }
  }

  # Redirect HTTP → HTTPS
  server {
    listen      80;
    server_name passport-shot.example.com;  # ↻ REPLACE
    return 301 https://$host$request_uri;
  }
}
